      },
      get: key => {
        const itemStr = localStorage.getItem(key)
        if (!itemStr) return undefined

          localStorage.removeItem(key)
          return undefined
        }
        return value
      }
    }

        script.onload = script.onreadystatechange = () => {

        }
        script.onerror = reject
        document.head.appendChild(script)
      }),

        link.rel = 'stylesheet'
