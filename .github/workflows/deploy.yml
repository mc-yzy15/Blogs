name: Deploy Hexo to GitHub Pages

on:
  push:
    branches:
      - master
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Install Dependencies
        run: |
          pnpm install
          pnpm add -g hexo-cli

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Detect languages
        run: python tools/detect_langs.py

      - name: Ensure stats data files exist
        run: |
          python3 -c "
          import json, os, urllib.request, base64
          repo = os.environ.get('GITHUB_REPOSITORY', '')
          token = os.environ.get('GITHUB_TOKEN', '')
          defaults = {
              'views.json': {'total': {'pv': 0, 'uv': 0}, 'categories': {}, 'tags': {}, 'posts': [], 'updated_at': ''},
              'offset.json': {'total_pv': 0, 'total_uv': 0, 'categories': {}, 'tags': {}, 'posts': {}}
          }
          os.makedirs('source/stats', exist_ok=True)
          for fname, default in defaults.items():
              fpath = f'source/stats/{fname}'
              if os.path.exists(fpath) and os.path.getsize(fpath) > 0:
                  continue
              content = None
              if repo and token:
                  try:
                      url = f'https://api.github.com/repos/{repo}/contents/stats/{fname}?ref=gh-pages'
                      req = urllib.request.Request(url, headers={'Authorization': f'token {token}', 'Accept': 'application/vnd.github.v3+json'})
                      with urllib.request.urlopen(req, timeout=10) as resp:
                          data = json.loads(resp.read())
                          content = base64.b64decode(data['content']).decode('utf-8')
                  except Exception as e:
                      print(f'Fetch from gh-pages failed for {fname}: {e}')
              if content:
                  with open(fpath, 'w', encoding='utf-8') as f:
                      f.write(content)
              else:
                  with open(fpath, 'w', encoding='utf-8') as f:
                      json.dump(default, f, ensure_ascii=False, indent=2)
          "
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}

      - name: Clean and Generate Static Files
        run: |
          hexo clean
          hexo generate

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./public
          publish_branch: gh-pages
