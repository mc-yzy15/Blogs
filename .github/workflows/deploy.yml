name: Deploy Hexo to GitHub Pages

on:
  push:
    branches:
      - master
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Install Dependencies
        run: |
          pnpm install
          pnpm add -g hexo-cli

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Detect languages
        run: python tools/detect_langs.py

      - name: Sync latest stats data
        run: |
          python3 -c "
          import json, os, urllib.request
          SITE = 'https://blogs.yzy15.dpdns.org'
          defaults = {
              'views.json': {'total': {'pv': 0, 'uv': 0}, 'categories': {}, 'tags': {}, 'posts': [], 'updated_at': ''},
              'offset.json': {'total_pv': 0, 'total_uv': 0, 'categories': {}, 'tags': {}, 'posts': {}}
          }
          os.makedirs('source/stats', exist_ok=True)
          for fname, default in defaults.items():
              fpath = f'source/stats/{fname}'
              content = None
              try:
                  url = f'{SITE}/stats/{fname}'
                  req = urllib.request.Request(url, headers={'User-Agent': 'Mozilla/5.0'})
                  with urllib.request.urlopen(req, timeout=15) as resp:
                      raw = resp.read().decode('utf-8')
                      json.loads(raw)
                      content = raw
                  print(f'Fetched {fname} from live site ({len(raw)} bytes)')
              except Exception as e:
                  print(f'Live site fetch failed for {fname}: {e}')
              if not content and os.path.exists(fpath) and os.path.getsize(fpath) > 0:
                  try:
                      with open(fpath, 'r', encoding='utf-8') as f:
                          json.load(f)
                      content = open(fpath, 'r', encoding='utf-8').read()
                      print(f'Using repo version of {fname}')
                  except Exception:
                      pass
              if not content:
                  content = json.dumps(default, ensure_ascii=False, indent=2)
                  print(f'Using default for {fname}')
              with open(fpath, 'w', encoding='utf-8') as f:
                  f.write(content)
          "

      - name: Clean and Generate Static Files
        run: |
          hexo clean
          hexo generate

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./public
          publish_branch: gh-pages
