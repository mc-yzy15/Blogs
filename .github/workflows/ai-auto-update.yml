name: AI Auto Update

on:
  push:
    branches:
      - master
    paths:
      - "source/_posts/**/*.md"
  workflow_dispatch:
    inputs:
      update_all:
        description: "Update all posts (yes/no)"
        required: false
        default: "no"
  schedule:
    - cron: '0 3 * * *'

permissions:
  contents: write

jobs:
  ai-update:
    runs-on: ubuntu-latest
    if: github.actor != 'github-actions[bot]'
    timeout-minutes: 30
    env:
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      OPENAI_BASE_URL: ${{ secrets.OPENAI_BASE_URL }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install openai pyyaml

      - name: Run AI auto-update
        run: python tools/ai_auto_update.py

      - name: Check for changes
        id: check_changes
        run: |
          if git diff --quiet; then
            echo "has_changes=false" >> $GITHUB_OUTPUT
          else
            echo "has_changes=true" >> $GITHUB_OUTPUT
          fi

      - name: Commit and push changes
        if: steps.check_changes.outputs.has_changes == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "chore: ai auto-update llms.txt, descriptions, and FAQ tags [skip ci]"
          for i in 1 2 3; do
            git pull --rebase origin master && git push origin master && break || {
              echo "Push attempt $i failed, retrying..."
              sleep 5
            }
          done
