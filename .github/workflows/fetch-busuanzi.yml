name: Fetch Busuanzi Data

on:
  schedule:
    - cron: '0 0 * * *'
  push:
    branches:
      - master
    paths:
      - 'source/_posts/**/*.md'
  repository_dispatch:
    types: [fetch_busuanzi]
  workflow_dispatch:

jobs:
  fetch:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Hexo
        run: npm install -g hexo-cli

      - name: Install dependencies
        run: npm install

      - name: Fetch data from Busuanzi and update views.json
        run: python3 tools/fetch_busuanzi.py

      - name: Commit and push changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -f source/stats/views.json
          git diff --cached --quiet || git commit -m "chore: fetch busuanzi analytics data"
          git push
