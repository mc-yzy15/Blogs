name: Translate Posts

on:
  push:
    branches:
      - master
    paths:
      - 'source/_posts/**/*.md'
  workflow_dispatch:
    inputs:
      translate_all:
        description: 'Translate all posts (yes/no)'
        required: false
        default: 'no'

permissions:
  contents: write

jobs:
  translate:
    runs-on: ubuntu-latest
    if: github.actor != 'github-actions[bot]'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: false
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Get changed files
        id: changed
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" && "${{ inputs.translate_all }}" == "yes" ]]; then
            echo "Translating all posts (manual trigger)..."
            find source/_posts -name '*.md' -not -path 'source/_posts/en/*' -not -path 'source/_posts/zh-TW/*' -not -path 'source/_posts/ja/*' > /tmp/translate_files.txt
          else
            BEFORE="${{ github.event.before }}"
            AFTER="${{ github.event.after }}"
            if [[ -z "$BEFORE" || "$BEFORE" == "0000000000000000000000000000000000000000" ]]; then
              find source/_posts -name '*.md' -not -path 'source/_posts/en/*' -not -path 'source/_posts/zh-TW/*' -not -path 'source/_posts/ja/*' > /tmp/translate_files.txt
            else
              git diff --name-only --diff-filter=AM "$BEFORE" "$AFTER" -- 'source/_posts/**/*.md' | grep -v -E '^source/_posts/(en|zh-TW|ja)/' > /tmp/translate_files.txt || true
            fi
          fi
          echo "Files to translate:"
          cat /tmp/translate_files.txt
          FILE_COUNT=$(grep -c '.' /tmp/translate_files.txt 2>/dev/null || echo "0")
          echo "file_count=$FILE_COUNT" >> $GITHUB_OUTPUT

      - name: Run translation
        if: steps.changed.outputs.file_count != '0'
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_BASE_URL: ${{ secrets.OPENAI_BASE_URL }}
          OPENAI_MODEL: ${{ secrets.OPENAI_MODEL }}
          DEFAULT_LANG: zh-CN
          TARGET_LANGS: en,zh-TW,ja
          BEFORE_SHA: ${{ github.event.before }}
          AFTER_SHA: ${{ github.event.after }}
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" && "${{ inputs.translate_all }}" == "yes" ]]; then
            while IFS= read -r file; do
              if [[ -n "$file" ]]; then
                echo "Translating: $file"
                python scripts/translate_posts.py "$file"
              fi
            done < /tmp/translate_files.txt
          else
            python scripts/translate_posts.py
          fi

      - name: Configure Git
        if: success()
        run: |
          git config --global user.name 'GitHub Actions Bot'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'

      - name: Commit and Push Translations
        if: success()
        run: |
          git add source/_posts/en/ source/_posts/zh-TW/ source/_posts/ja/ 2>/dev/null || true
          git diff --staged --quiet || git commit -m "i18n: auto-translate posts $(date +'%Y-%m-%d %H:%M:%S')"
          git push origin master
