name: Sync WordPress to Hexo

on:
  schedule:
    - cron: "0 2 * * *"
  workflow_dispatch:
    inputs:
      full_sync:
        description: "Full sync (yes/no)"
        required: false
        default: "no"

permissions:
  contents: write

jobs:
  sync-wordpress:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: false
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Install Dependencies
        run: pnpm install

      - name: Sync WordPress Posts
        run: |
          cat > sync.js << 'SYNCEOF'
          const https = require('https');
          const fs = require('fs');
          const path = require('path');

          const API_HOST = 'public-api.wordpress.com';
          const SITE_SLUG = 'home159263.wordpress.com';
          const POSTS_DIR = 'source/_posts/WordPress';
          const POSTS_FILE = 'source/_posts/wordpress_sync.json';

          if (!fs.existsSync(POSTS_DIR)) {
            fs.mkdirSync(POSTS_DIR, { recursive: true });
          }

          let syncedIds = [];
          if (fs.existsSync(POSTS_FILE)) {
            syncedIds = JSON.parse(fs.readFileSync(POSTS_FILE, 'utf8'));
          }

          function fetchJSON(urlPath) {
            return new Promise((resolve, reject) => {
              const options = {
                hostname: API_HOST,
                path: urlPath,
                headers: {
                  'User-Agent': 'Hexo-WordPress-Sync/2.0',
                  'Accept': 'application/json'
                }
              };

              https.get(options, (res) => {
                let data = '';
                res.on('data', (chunk) => data += chunk);
                res.on('end', () => {
                  if (res.statusCode >= 300 && res.statusCode < 400 && res.headers.location) {
                    fetchJSON(res.headers.location).then(resolve).catch(reject);
                    return;
                  }
                  if (res.statusCode !== 200) {
                    reject(new Error('HTTP ' + res.statusCode + ': ' + data.slice(0, 200)));
                    return;
                  }
                  try {
                    const json = JSON.parse(data);
                    resolve({ data: json, headers: res.headers });
                  } catch (e) {
                    reject(new Error('JSON parse error (got HTML?): ' + data.slice(0, 100)));
                  }
                });
              }).on('error', reject);
            });
          }

          function fetchPosts(page = 1) {
            return fetchJSON('/wp/v2/sites/' + SITE_SLUG + '/posts?per_page=100&page=' + page + '&_embed=true');
          }

          function fetchTags() {
            return fetchJSON('/wp/v2/sites/' + SITE_SLUG + '/tags?per_page=100');
          }

          function fetchCategories() {
            return fetchJSON('/wp/v2/sites/' + SITE_SLUG + '/categories?per_page=100');
          }

          function convertToHexo(post, tagMap, categoryMap) {
            const date = new Date(post.date);
            const filename = post.slug + '.md';
            const filepath = path.join(POSTS_DIR, filename);

            let content = '---\n';
            content += 'title: ' + JSON.stringify(post.title.rendered) + '\n';
            content += 'date: ' + date.toISOString() + '\n';
            content += 'wordpress_id: ' + post.id + '\n';
            content += 'wordpress_url: ' + post.link + '\n';
            content += 'categories:\n';
            content += '  - WordPress\n';
            if (post.categories && post.categories.length > 0 && categoryMap) {
              post.categories.forEach(catId => {
                const catName = categoryMap[catId];
                if (catName && catName !== 'WordPress') {
                  content += '  - ' + catName + '\n';
                }
              });
            }
            if (post.tags && post.tags.length > 0 && tagMap) {
              content += 'tags:\n';
              post.tags.forEach(tagId => {
                const tagName = tagMap[tagId];
                if (tagName) {
                  content += '  - ' + tagName + '\n';
                }
              });
            }
            content += '---\n\n';
            content += post.content.rendered
              .replace(/<h1[^>]*>(.*?)<\/h1>/gi, '# $1')
              .replace(/<h2[^>]*>(.*?)<\/h2>/gi, '## $1')
              .replace(/<h3[^>]*>(.*?)<\/h3>/gi, '### $1')
              .replace(/<h4[^>]*>(.*?)<\/h4>/gi, '#### $1')
              .replace(/<h5[^>]*>(.*?)<\/h5>/gi, '##### $1')
              .replace(/<h6[^>]*>(.*?)<\/h6>/gi, '###### $1')
              .replace(/<strong[^>]*>(.*?)<\/strong>/gi, '**$1**')
              .replace(/<b[^>]*>(.*?)<\/b>/gi, '**$1**')
              .replace(/<em[^>]*>(.*?)<\/em>/gi, '*$1*')
              .replace(/<i[^>]*>(.*?)<\/i>/gi, '*$1*')
              .replace(/<a[^>]*href="([^"]*)"[^>]*>(.*?)<\/a>/gi, '[$2]($1)')
              .replace(/<img[^>]*src="([^"]*)"[^>]*alt="([^"]*)"[^>]*>/gi, '![$2]($1)')
              .replace(/<img[^>]*alt="([^"]*)"[^>]*src="([^"]*)"[^>]*>/gi, '![$1]($2)')
              .replace(/<img[^>]*src="([^"]*)"[^>]*>/gi, '![]($1)')
              .replace(/<blockquote[^>]*>(.*?)<\/blockquote>/gi, '> $1')
              .replace(/<code[^>]*>(.*?)<\/code>/gi, '`$1`')
              .replace(/<pre[^>]*>(.*?)<\/pre>/gi, '```\n$1\n```')
              .replace(/<ul[^>]*>/gi, '')
              .replace(/<\/ul>/gi, '')
              .replace(/<ol[^>]*>/gi, '')
              .replace(/<\/ol>/gi, '')
              .replace(/<li[^>]*>(.*?)<\/li>/gi, '- $1\n')
              .replace(/<p[^>]*>(.*?)<\/p>/gi, '$1\n\n')
              .replace(/<br\s*\/?>/gi, '\n')
              .replace(/<[^>]+>/g, '')
              .replace(/&nbsp;/g, ' ')
              .replace(/&amp;/g, '&')
              .replace(/&lt;/g, '<')
              .replace(/&gt;/g, '>')
              .replace(/&quot;/g, '"')
              .replace(/&#039;/g, "'")
              .replace(/&rsquo;/g, "'")
              .replace(/&lsquo;/g, "'")
              .replace(/&rdquo;/g, '"')
              .replace(/&ldquo;/g, '"')
              .replace(/&#8211;/g, '-')
              .replace(/&#8212;/g, '--')
              .replace(/&[0-9]+;/g, '')
              .trim();

            return { filepath, content, id: post.id };
          }

          async function main() {
            try {
              console.log('开始同步 WordPress 博客...');

              let tagMap = {};
              try {
                const { data: tags } = await fetchTags();
                tags.forEach(tag => { tagMap[tag.id] = tag.name; });
                console.log('已加载', Object.keys(tagMap).length, '个标签');
              } catch (e) {
                console.log('标签加载失败，跳过标签同步:', e.message);
              }

              let categoryMap = {};
              try {
                const { data: categories } = await fetchCategories();
                categories.forEach(cat => { categoryMap[cat.id] = cat.name; });
                console.log('已加载', Object.keys(categoryMap).length, '个分类');
              } catch (e) {
                console.log('分类加载失败，跳过分类同步:', e.message);
              }

              const { data: posts, headers } = await fetchPosts(1);
              const totalPages = parseInt(headers['x-wp-totalpages'] || '1');
              const totalPosts = parseInt(headers['x-wp-total'] || '0');
              console.log('共找到', totalPosts, '篇文章，分', totalPages, '页');

              let allPosts = [...posts];

              for (let page = 2; page <= totalPages; page++) {
                const { data: morePosts } = await fetchPosts(page);
                allPosts = allPosts.concat(morePosts);
              }

              let newCount = 0;
              const newIds = [];

              for (const post of allPosts) {
                if (!syncedIds.includes(post.id)) {
                  const { filepath, content, id } = convertToHexo(post, tagMap, categoryMap);
                  fs.writeFileSync(filepath, content);
                  console.log('已同步:', post.title.rendered);
                  newCount++;
                  newIds.push(id);
                }
              }

              syncedIds = [...syncedIds, ...newIds];
              fs.writeFileSync(POSTS_FILE, JSON.stringify(syncedIds));

              console.log('同步完成！新增', newCount, '篇文章');

              if (newCount > 0) {
                console.log('HAS_NEW=true');
              } else {
                console.log('HAS_NEW=false');
              }
            } catch (error) {
              console.error('同步失败:', error.message);
              process.exit(1);
            }
          }

          main();
          SYNCEOF
          node sync.js

      - name: Configure Git
        if: success()
        run: |
          git config --global user.name 'GitHub Actions Bot'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'

      - name: Commit and Push Changes
        if: success()
        run: |
          git add -A
          git status
          git diff --staged --quiet || git commit -m "docs: sync WordPress posts $(date +'%Y-%m-%d %H:%M:%S')"
          git push origin master
